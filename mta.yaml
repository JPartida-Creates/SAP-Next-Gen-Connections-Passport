_schema-version: "3.1"
ID: connections-passport
description: SAP Next Gen Connections Passport
version: 1.0.0

modules:

  # ── App Router (also serves static React files) ───────────────
  - name: connections-passport-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      disk-quota: 512M
      memory: 256M
    build-parameters:
      requires:
        - name: connections-passport-ui
          artifacts:
            - dist/**
          target-path: resources
    requires:
      - name: connections-passport-xsuaa
    provides:
      - name: app-api
        properties:
          app-url: "${default-url}"

  # ── React Frontend (built and copied for approuter) ───────────
  - name: connections-passport-ui
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm run build
      supported-platforms: []

resources:

  # ── XSUAA (SSO) ───────────────────────────────────────────────
  - name: connections-passport-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      service-name: connections-passport-xsuaa
