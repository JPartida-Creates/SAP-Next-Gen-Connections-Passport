_schema-version: "3.1"
ID: connections-passport
description: SAP Next Gen Connections Passport
version: 1.0.0

modules:

  # ── App Router (serves static React files + proxies /api/* to CAP) ─────────
  - name: connections-passport-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      disk-quota: 512M
      memory: 256M
    build-parameters:
      requires:
        - name: connections-passport-ui
          artifacts:
            - dist/**
          target-path: resources
    requires:
      - name: connections-passport-xsuaa
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
    provides:
      - name: app-api
        properties:
          app-url: "${default-url}"

  # ── React Frontend (Vite build → copied into approuter/resources) ──────────
  - name: connections-passport-ui
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm run build
      supported-platforms: []

  # ── CAP Node.js Service (HANA persistence) ─────────────────────────────────
  - name: connections-passport-srv
    type: nodejs
    path: cap
    parameters:
      disk-quota: 512M
      memory: 256M
    build-parameters:
      builder: npm
    requires:
      - name: connections-passport-xsuaa
      - name: connections-passport-hdi
    provides:
      - name: srv-api
        properties:
          srv-url: "${default-url}"

resources:

  # ── XSUAA (SSO) ────────────────────────────────────────────────────────────
  - name: connections-passport-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      service-name: connections-passport-xsuaa

  # ── HANA HDI Container (tables auto-created from CDS schema on first boot) ─
  - name: connections-passport-hdi
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
      service-name: connections-passport-hdi
    properties:
      hdi-service-name: "${service-name}"
